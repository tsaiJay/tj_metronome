# push main → Docker Hub :latest
# git tag v1.2.3 && git push origin v1.2.3 → :latest + :v1.2.3
#
# GitHub repo → Settings → Secrets and variables → Actions：
#   DOCKERHUB_USERNAME
#   DOCKERHUB_TOKEN   （Docker Hub → Account Settings → Security → Access Token）
name: Build and push Docker image to docker hub

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  DOCKER_REPO: tj_metronome

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker image name + tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_REPO }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
            type=ref,event=tag,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
